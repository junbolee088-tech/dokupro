<title>DokuPro — Konverter & Toolkit Dokumen Offline</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<style>
:root{
  --bg:#0E0F12; --bg-soft:#15171C; --card:#1B1E25; --card-2:#21242C;
  --ink:#EDEEF2; --muted:#8A8F9C; --line:#2A2E38;
  --accent:#7C5CFF; --accent-2:#33D6B0; --warn:#FFB454; --danger:#FF6B6B;
  --grad: linear-gradient(135deg,#7C5CFF 0%, #33D6B0 100%);
  --radius:14px;
}
body.light{
  --bg:#F5F4FB; --bg-soft:#FFFFFF; --card:#FFFFFF; --card-2:#F1EFFA;
  --ink:#161721; --muted:#65697A; --line:#E4E2F0;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--ink);transition:background .25s,color .25s;}
.app{min-height:100vh;display:flex;flex-direction:column;}

/* ---- Topbar ---- */
.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;background:var(--bg-soft);border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);flex-wrap:wrap;gap:8px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;cursor:pointer;}
.brand .logo{
  width:34px;height:34px;border-radius:9px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;
}
.privacy-badge{
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  color:var(--accent-2);background:rgba(51,214,176,.12);padding:6px 12px;border-radius:20px;
}
.top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;
  transition:border-color .15s, transform .1s;
}
.icon-btn:hover{border-color:var(--accent);}
.icon-btn:active{transform:scale(.94);}

.lang-selector{position:relative;display:inline-block;}
.lang-btn{
  background:var(--card);border:1px solid var(--line);color:var(--ink);
  padding:6px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;transition:border-color .15s;
}
.lang-btn:hover{border-color:var(--accent);}
.lang-dropdown{
  display:none;position:absolute;right:0;top:calc(100% + 6px);
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  min-width:180px;padding:6px;box-shadow:0 12px 32px rgba(0,0,0,.4);z-index:60;
}
.lang-dropdown.show{display:block;}
.lang-option{
  padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;gap:8px;transition:background .1s;
}
.lang-option:hover{background:var(--bg-soft);}
.lang-option .check{color:var(--accent-2);visibility:hidden;}
.lang-option.active .check{visibility:visible;}
.lang-option.active{background:var(--bg-soft);}

/* ---- Layout ---- */
.main{flex:1;max-width:1200px;width:100%;margin:0 auto;padding:32px 24px 60px;}
.hero{margin-bottom:28px;}
.hero h1{font-size:30px;margin:0 0 6px;font-weight:800;letter-spacing:-.5px;}
.hero p{color:var(--muted);margin:0;font-size:14.5px;max-width:640px;line-height:1.6;}
.search-row{margin:20px 0 8px;display:flex;gap:10px;flex-wrap:wrap;}
.search-row input{
  flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--ink);
  padding:12px 16px;border-radius:10px;font-family:inherit;font-size:14px;
}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{
  padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:var(--card);
  font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;
}
.pill.active{background:var(--grad);color:#fff;border-color:transparent;}
.section-label{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:28px 0 12px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.tool-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s, border-color .15s, box-shadow .15s;
}
.tool-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 10px 26px rgba(124,92,255,.15);}
.tool-card .ic{
  width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:12px;color:#fff;
}
.tool-card h3{font-size:14.5px;margin:0 0 4px;font-weight:600;}
.tool-card p.desc{font-size:11.5px;color:var(--muted);margin:0;line-height:1.4;}
.badge{
  position:absolute;top:12px;right:12px;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:6px;
  text-transform:uppercase;letter-spacing:.03em;
}
.badge.full{background:rgba(51,214,176,.15);color:var(--accent-2);}
.badge.beta{background:rgba(255,180,84,.15);color:var(--warn);}
.badge.ai{background:rgba(124,92,255,.18);color:var(--accent);}

/* ---- Tool panel ---- */
.panel{display:none;}
.panel.show{display:block;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel-head{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.back-btn{
  display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);
  color:var(--ink);padding:9px 14px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;
}
.panel-head h2{margin:0;font-size:20px;font-weight:700;}
.panel-head .status-tag{font-size:11px;padding:4px 10px;border-radius:7px;font-weight:700;}
.panel-body{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;}
@media (max-width:860px){.panel-body{grid-template-columns:1fr;}}
.card-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}

.dropzone{
  border:1.5px dashed var(--line);border-radius:12px;padding:34px 16px;text-align:center;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.dropzone.drag{border-color:var(--accent);background:rgba(124,92,255,.06);}
.dropzone i{font-size:26px;color:var(--accent);margin-bottom:8px;display:block;}
.dropzone p{margin:0;color:var(--muted);font-size:13px;}
.dropzone small{color:var(--muted);font-size:11px;}

.filelist{margin-top:14px;display:flex;flex-direction:column;gap:8px;max-height:240px;overflow:auto;}
.fileitem{
  display:flex;align-items:center;gap:10px;background:var(--card-2);border:1px solid var(--line);
  border-radius:9px;padding:9px 11px;font-size:12.5px;
}
.fileitem i.ftype{color:var(--accent);}
.fileitem .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fileitem .fsize{color:var(--muted);font-size:11px;}
.fileitem .frm{cursor:pointer;color:var(--danger);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.field select,.field input[type=text],.field input[type=number],.field input[type=password],.field textarea{
  width:100%;background:var(--card-2);border:1px solid var(--line);color:var(--ink);padding:10px 12px;
  border-radius:8px;font-family:inherit;font-size:13px;
}
.field textarea{resize:vertical;min-height:90px;font-family:'JetBrains Mono',monospace;font-size:12px;}
.field-row{display:flex;gap:10px;flex-wrap:wrap;}
.field-row .field{flex:1;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);margin-bottom:10px;}

.btn{
  border:none;border-radius:10px;padding:12px 18px;font-family:inherit;font-weight:700;font-size:13.5px;
  cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:opacity .15s, transform .1s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--grad);color:#fff;width:100%;justify-content:center;}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:var(--card-2);color:var(--ink);border:1px solid var(--line);}
.btn-sm{padding:7px 12px;font-size:12px;}

.progress-wrap{margin-top:14px;display:none;}
.progress-wrap.show{display:block;}
.progress-bar-bg{height:7px;border-radius:6px;background:var(--card-2);overflow:hidden;}
.progress-bar-fill{height:100%;width:0%;background:var(--grad);transition:width .25s;}
.progress-label{font-size:11.5px;color:var(--muted);margin-top:6px;text-align:center;}

.result-box{margin-top:16px;border:1px solid var(--line);border-radius:10px;padding:14px;background:var(--card-2);display:none;}
.result-box.show{display:block;}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.result-row:last-child{margin-bottom:0;}
.result-row .rname{flex:1;font-size:12.5px;font-weight:600;}

.note-box{margin-top:18px;font-size:12px;color:var(--muted);line-height:1.7;border-top:1px solid var(--line);padding-top:14px;}
.note-box i{color:var(--accent);margin-right:6px;}
.privacy-strip{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--accent-2);font-weight:600;
  background:rgba(51,214,176,.08);padding:10px 14px;border-radius:9px;margin-bottom:16px;
}
.aibox{border:1px solid rgba(124,92,255,.35);background:rgba(124,92,255,.06);border-radius:10px;padding:14px;margin-bottom:14px;}
.aibox p{margin:0 0 8px;font-size:12px;color:var(--muted);line-height:1.6;}
.preview-canvas-wrap{max-height:420px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff;text-align:center;padding:10px;}
.preview-canvas-wrap canvas{max-width:100%;border-radius:4px;}
.viewer-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:10px;font-size:13px;}
.history-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto;}
.hist-item{display:flex;align-items:center;gap:10px;background:var(--card-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12px;}
.hist-item .ht{flex:1;}
.hist-item .htime{color:var(--muted);font-size:10.5px;}
.empty-state{color:var(--muted);font-size:12.5px;text-align:center;padding:20px 0;}
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:10px;z-index:200;}
.toast{
  background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent-2);
  padding:13px 16px;border-radius:10px;font-size:13px;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.3);
  animation:slidein .2s ease;
}
.toast.err{border-left-color:var(--danger);}
@keyframes slidein{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.sig-pad{border:1.5px dashed var(--line);border-radius:10px;background:#fff;touch-action:none;cursor:crosshair;}
.diff-add{background:rgba(51,214,176,.18);}
.diff-del{background:rgba(255,107,107,.18);text-decoration:line-through;}
.footer{text-align:center;color:var(--muted);font-size:11.5px;padding:24px;border-top:1px solid var(--line);}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand" onclick="showDashboard()">
      <div class="logo"><i class="fa-solid fa-layer-group"></i></div>
      <span data-i18n="appName">DokuPro</span>
    </div>
    <div class="privacy-badge"><i class="fa-solid fa-lock"></i> <span data-i18n="privacyBadge">100% Privat — Tanpa Upload ke Server</span></div>
    <div class="top-actions">
      <div class="lang-selector">
        <button class="lang-btn" id="langBtn"><i class="fa-solid fa-globe"></i> <span id="currentLangLabel">🇮🇩</span> <i class="fa-solid fa-chevron-down" style="font-size:10px;"></i></button>
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-option active" data-lang="id"><span class="check"><i class="fa-solid fa-check"></i></span> 🇮🇩 Indonesia</div>
          <div class="lang-option" data-lang="en"><span class="check"><i class="fa-solid fa-check"></i></span> 🇬🇧 English</div>
          <div class="lang-option" data-lang="ja"><span class="check"><i class="fa-solid fa-check"></i></span> 🇯🇵 日本語</div>
          <div class="lang-option" data-lang="zh"><span class="check"><i class="fa-solid fa-check"></i></span> 🇨🇳 中文</div>
          <div class="lang-option" data-lang="ar"><span class="check"><i class="fa-solid fa-check"></i></span> 🇸🇦 العربية</div>
        </div>
      </div>
      <div class="icon-btn" id="historyBtn" title="Riwayat"><i class="fa-solid fa-clock-rotate-left"></i></div>
      <div class="icon-btn" id="darkBtn" title="Tampilan"><i class="fa-solid fa-moon"></i></div>
    </div>
  </div>

  <div class="main">
    <div id="dashboard">
      <div class="hero">
        <h1 data-i18n="heroTitle">Toolkit Dokumen All-in-One</h1>
        <p data-i18n="heroDesc">33 alat konversi & edit dokumen. Semua proses berjalan langsung di browser kamu — file tidak pernah dikirim ke server mana pun.</p>
        <p style="font-size:12px;color:var(--accent);margin:6px 0 0;font-weight:600;">by Riani</p>
      </div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Cari tool..." data-i18n-placeholder="searchPlaceholder">
      </div>
      <div class="cat-pills" id="catPills"></div>
      <div id="toolGridWrap"></div>
    </div>
    <div id="panelHost"></div>
  </div>

  <div class="footer" data-i18n="footer">DokuPro · 100% offline di browser kamu</div>
</div>

<div id="renderHost" style="position:fixed;top:0;left:-99999px;width:900px;background:#fff;"></div>

let currentLang = localStorage.getItem('dokupro_lang') || 'id';
function t(key){ return TRANSLATIONS[currentLang]?.[key] || TRANSLATIONS['id'][key] || key; }

function applyLanguage(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{ el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.documentElement.dir = LANGUAGES[currentLang].dir;
  document.documentElement.lang = currentLang;
  document.getElementById('currentLangLabel').textContent = LANGUAGES[currentLang].label.split(' ')[0];
  document.querySelectorAll('.lang-option').forEach(el=>{ el.classList.toggle('active', el.dataset.lang===currentLang); });
  localStorage.setItem('dokupro_lang', currentLang);
  renderCatPills(); renderGrid();
}

function toast(msg, isErr=false){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast'+(isErr?' err':'');
  el.innerHTML=(isErr?'<i class="fa-solid fa-circle-exclamation" style="color:var(--danger);margin-right:6px;"></i>':'<i class="fa-solid fa-circle-check" style="color:var(--accent-2);margin-right:6px;"></i>')+msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all .2s'; setTimeout(()=>el.remove(),200); },3600);
}
function fmtSize(b){ if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(2)+' MB'; }
function download(blob, name){ const u=URL.createObjectURL(blob),a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),4000); }
async function zipAndDownload(files, name){ const z=new JSZip(); files.forEach(f=>z.file(f.name,f.blob)); download(await z.generateAsync({type:'blob'}),name); }
function readAsArrayBuffer(f){ return new Promise((r,j)=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=j; fr.readAsArrayBuffer(f); }); }
function readAsText(f){ return new Promise((r,j)=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=j; fr.readAsText(f); }); }
function readAsDataURL(f){ return new Promise((r,j)=>{ const fr=new FileReader(); fr.onload=()=>r(fr.result); fr.onerror=j; fr.readAsDataURL(f); }); }

function pushHistory(tool, file){ const h=JSON.parse(localStorage.getItem('dokupro_history')||'[]'); h.unshift({tool,file,time:new Date().toLocaleString()}); localStorage.setItem('dokupro_history',JSON.stringify(h.slice(0,50))); }
function renderHistory(){ const h=JSON.parse(localStorage.getItem('dokupro_history')||'[]'),l=document.getElementById('historyListBody'); if(!l)return; l.innerHTML=h.length?h.map(x=>`<div class="hist-item"><i class="fa-solid fa-file"></i><div class="ht"><div>${x.tool}</div><div class="htime">${x.file} · ${x.time}</div></div></div>`).join(''):`<div class="empty-state">${t('noHistory')}</div>`; }

/* PDF Helpers */
async function loadPdfJs(ab){ return await pdfjsLib.getDocument({data:ab}).promise; }
async function loadPdfLib(ab){ return await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true}); }
async function pageToCanvas(doc, pn, scale=1.5){ const p=await doc.getPage(pn),vp=p.getViewport({scale}),c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height; await p.render({canvasContext:c.getContext('2d'),viewport:vp}).promise; return c; }
function parsePageRange(s, max){ if(!s||!s.trim()) return Array.from({length:max},(_,i)=>i+1); const out=new Set(); s.split(',').forEach(p=>{ p=p.trim(); if(!p)return; if(p.includes('-')){ let [a,b]=p.split('-').map(x=>parseInt(x.trim())); if(isNaN(b))b=max; for(let i=a;i<=b;i++) if(i>=1&&i<=max) out.add(i); } else { const n=parseInt(p); if(n>=1&&n<=max) out.add(n); } }); return Array.from(out).sort((a,b)=>a-b); }

async function htmlStringToPdfBlob(html, opts={}){
  const rh=document.getElementById('renderHost'); rh.innerHTML='';
  const pd=new DOMParser(),parsed=pd.parseFromString(html,'text/html'),inj=[];
  parsed.querySelectorAll('head style,head link[rel="stylesheet"]').forEach(n=>{ const c=n.cloneNode(true); c.setAttribute('data-inj','1'); document.head.appendChild(c); inj.push(c); });
  const w=document.createElement('div'); w.innerHTML=parsed.body?parsed.body.innerHTML:html; rh.appendChild(w);
  await Promise.all(Array.from(rh.querySelectorAll('img')).map(i=>i.complete?Promise.resolve():new Promise(r=>{i.onload=r;i.onerror=r;setTimeout(r,4000);})));
  await new Promise(r=>setTimeout(r,250));
  const fh=Math.max(rh.scrollHeight,w.scrollHeight,10);
  const canvas=await html2canvas(rh,{width:900,windowWidth:900,height:fh,windowHeight:fh,scale:2,useCORS:true,backgroundColor:'#ffffff'});
  inj.forEach(n=>n.remove()); rh.innerHTML='';
  const pdf=new jsPDF({orientation:opts.orientation||'portrait',unit:'mm',format:opts.pageSize||'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  const iw=pw,ih=(canvas.height*iw)/canvas.width,img=canvas.toDataURL('image/jpeg',0.95);
  let left=ih,pos=0,first=true;
  while(left>0){ if(!first) pdf.addPage(); pdf.addImage(img,'JPEG',0,pos,iw,ih); left-=ph; pos-=ph; first=false; }
  return pdf.output('blob');
}

function htmlToDocBlob(body,title='Document'){
  const w=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>${title}</title><style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;}img{max-width:100%;}</style></head><body>${body}</body></html>`;
  return new Blob(['\ufeff',w],{type:'application/msword'});
}

async function callAI(apiKey, endpoint, model, messages){
  const res=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},body:JSON.stringify({model,messages,max_tokens:1200})});
  if(!res.ok) throw new Error(t('error')+'('+res.status+')');
  const d=await res.json();
  return d.choices?.[0]?.message?.content||JSON.stringify(d);
}

let activeCat='all';
function renderCatPills(){
  const wrap=document.getElementById('catPills');
  const all=[{id:'all',labelKey:'catAll',icon:'fa-grid-2'},...CATEGORIES];
  wrap.innerHTML=all.map(c=>`<div class="pill ${c.id===activeCat?'active':''}" data-cat="${c.id}"><i class="fa-solid ${c.icon}"></i> ${getCatLabel(c)}</div>`).join('');
  wrap.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{ activeCat=p.dataset.cat; renderCatPills(); renderGrid(); }));

function renderGrid(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const wrap=document.getElementById('toolGridWrap');
  const cats=activeCat==='all'?CATEGORIES:CATEGORIES.filter(c=>c.id===activeCat);
  let html='';
  cats.forEach(cat=>{
    const tools=TOOLS.filter(tool=>tool.cat===cat.id&&(getToolName(tool).toLowerCase().includes(q)||getToolDesc(tool).toLowerCase().includes(q)));
    if(!tools.length) return;
    html+=`<div class="section-label">${getCatLabel(cat)}</div><div class="grid">`;
    tools.forEach(tool=>{
      const st=STATUS_LABEL[tool.status]||STATUS_LABEL.full;
      html+=`<div class="tool-card" data-tool="${tool.id}"><span class="badge ${st.cls}">${st.text}</span><div class="ic" style="background:${cat.color}"><i class="fa-solid ${tool.icon}"></i></div><h3>${getToolName(tool)}</h3><p class="desc">${getToolDesc(tool)}</p></div>`;
    });
    html+=`</div>`;
  });
  if(!html) html=`<div class="empty-state">Tidak ada tool yang cocok.</div>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll('.tool-card').forEach(c=>c.addEventListener('click',()=>openTool(c.dataset.tool)));

/* Reusable builders */
function buildDropzone(container, {accept='*',multiple=true,label='',sub=''}={}, onFiles){
  const id='dz_'+Math.random().toString(36).slice(2);
  container.innerHTML=`<div class="dropzone" id="${id}"><i class="fa-solid fa-cloud-arrow-up"></i><p><strong>${label||t('uploadHere')}</strong></p><small>${sub}</small></div><input type="file" id="${id}_in" accept="${accept}" ${multiple?'multiple':''} style="display:none;"><div class="filelist" id="${id}_list"></div>`;
  const dz=document.getElementById(id),input=document.getElementById(`${id}_in`),listEl=document.getElementById(`${id}_list`);
  let files=[];
  function renderList(){ listEl.innerHTML=files.map((f,i)=>`<div class="fileitem"><i class="fa-solid fa-file ftype"></i><span class="fname">${f.name}</span><span class="fsize">${fmtSize(f.size)}</span><i class="fa-solid fa-xmark frm" data-i="${i}"></i></div>`).join(''); listEl.querySelectorAll('.frm').forEach(el=>el.addEventListener('click',e=>{ files.splice(parseInt(e.target.dataset.i),1); renderList(); if(onFiles) onFiles(files); })); }
  dz.addEventListener('click',()=>input.click());
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag'); const d=Array.from(e.dataTransfer.files); files=multiple?files.concat(d):d; renderList(); if(onFiles) onFiles(files); });
  input.addEventListener('change',e=>{ const d=Array.from(e.target.files); files=multiple?files.concat(d):d; renderList(); if(onFiles) onFiles(files); });
  return {getFiles:()=>files, reset:()=>{files=[];renderList();}};
}
function buildProgress(container){
  const id='pg_'+Math.random().toString(36).slice(2),div=document.createElement('div');
  div.className='progress-wrap'; div.id=id;
  div.innerHTML=`<div class="progress-bar-bg"><div class="progress-bar-fill" id="${id}_f"></div></div><div class="progress-label" id="${id}_l"></div>`;
  container.appendChild(div);
  return { start(l){div.classList.add('show');this.set(0,l);}, set(p,l){document.getElementById(`${id}_f`).style.width=p+'%';document.getElementById(`${id}_l`).textContent=l||'';}, done(){setTimeout(()=>div.classList.remove('show'),600);} };
}
function buildResultBox(container){
  const div=document.createElement('div'); div.className='result-box'; container.appendChild(div);
  return { show(items){ div.classList.add('show'); div.innerHTML=items.map((it,i)=>`<div class="result-row"><i class="fa-solid fa-file-circle-check" style="color:var(--accent-2)"></i><span class="rname">${it.name}</span><button class="btn btn-secondary btn-sm" data-i="${i}"><i class="fa-solid fa-download"></i> ${t('download')}</button></div>`).join('')+(items.length>1?`<button class="btn btn-primary btn-sm" id="zipAll" style="margin-top:10px;"><i class="fa-solid fa-file-zipper"></i> ${t('downloadAll')}</button>`:''); div.querySelectorAll('button[data-i]').forEach(b=>b.addEventListener('click',()=>download(items[b.dataset.i].blob,items[b.dataset.i].name))); const zb=div.querySelector('#zipAll'); if(zb) zb.addEventListener('click',()=>zipAndDownload(items,'dokupro-hasil.zip')); }, clear(){div.classList.remove('show');div.innerHTML='';} };
}
function field(label, inner){ return `<div class="field"><label>${label}</label>${inner}</div>`; }
function sel(id, opts){ return `<select id="${id}">${opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}</select>`; }
function inp(id, type='text', placeholder='', value=''){ return `<input type="${type}" id="${id}" placeholder="${placeholder}" value="${value}">`; }

'add-signature': function(host){
  host.innerHTML=`<div class="card-box" id="lhs"></div><div class="card-box" id="rhs"></div>`;
  const lhs=host.querySelector('#lhs'),rhs=host.querySelector('#rhs');
  const dz=buildDropzone(lhs,{accept:'.pdf',multiple:false});
  lhs.insertAdjacentHTML('beforeend',`
    <p style="font-size:12px;color:var(--muted);margin:14px 0 6px;">${t('signature')}</p>
    <canvas id="sigCanvas" class="sig-pad" width="400" height="140"></canvas>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn btn-secondary btn-sm" id="clearSig"><i class="fa-solid fa-eraser"></i> ${t('sigClear')}</button>
    </div>
    <div class="field-row" style="margin-top:12px;">
      <div class="field"><label>${t('page')}</label><input type="number" id="sigPage" value="1" min="1"></div>
      <div class="field"><label>X (mm)</label><input type="number" id="sigX" value="20"></div>
      <div class="field"><label>Y dari atas (mm)</label><input type="number" id="sigY" value="20"></div>
      <div class="field"><label>${t('width')} (mm)</label><input type="number" id="sigW" value="60"></div>
    </div>
  `);
  const canvas=lhs.querySelector('#sigCanvas'),ctx=canvas.getContext('2d');
  let drawing=false,lastX=0,lastY=0;
  canvas.addEventListener('mousedown',e=>{ drawing=true; [lastX,lastY]=[e.offsetX,e.offsetY]; });
  canvas.addEventListener('mousemove',e=>{ if(!drawing) return; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(e.offsetX,e.offsetY); ctx.strokeStyle='#1a1aff'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke(); [lastX,lastY]=[e.offsetX,e.offsetY]; });
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); drawing=true; [lastX,lastY]=[e.touches[0].clientX-r.left,e.touches[0].clientY-r.top]; },{passive:false});
  canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(!drawing) return; const r=canvas.getBoundingClientRect(),x=e.touches[0].clientX-r.left,y=e.touches[0].clientY-r.top; ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.strokeStyle='#1a1aff'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.stroke(); [lastX,lastY]=[x,y]; },{passive:false});
  canvas.addEventListener('touchend',()=>drawing=false);
  lhs.querySelector('#clearSig').addEventListener('click',()=>ctx.clearRect(0,0,canvas.width,canvas.height));

  const pg=buildProgress(rhs),rb=buildResultBox(rhs);
  const btn=document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='14px';
  btn.innerHTML=`<i class="fa-solid fa-signature"></i> ${t('sigPaste')}`; rhs.appendChild(btn);
  btn.addEventListener('click', async()=>{
    const files=dz.getFiles(); if(!files.length){ toast(t('error')+'Pilih file PDF',true); return; }
    pg.start(t('processing')); rb.clear();
    try{
      const ab=await readAsArrayBuffer(files[0]),doc=await loadPdfLib(ab);
      const pgNum=parseInt(lhs.querySelector('#sigPage').value)-1;
      const x=parseFloat(lhs.querySelector('#sigX').value);
      const yTop=parseFloat(lhs.querySelector('#sigY').value);
      const w=parseFloat(lhs.querySelector('#sigW').value);
      const page=doc.getPage(pgNum),{height}=page.getSize();
      const dataUrl=canvas.toDataURL('image/png');
      const base64=dataUrl.split(',')[1];
      const pngImg=await doc.embedPng(Uint8Array.from(atob(base64),c=>c.charCodeAt(0)));
      const ratio=canvas.height/canvas.width;
      const h=w*ratio;
      page.drawImage(pngImg,{x:x,y:height-yTop-h,width:w,height:h});
      const bytes=await doc.save();
      pg.done(); rb.show([{name:'signed.pdf',blob:new Blob([bytes],{type:'application/pdf'})}]); pushHistory('Add Signature',files[0].name); toast(t('addSignature'));
    }catch(e){ pg.done(); toast(t('error')+e.message,true); }
  });
},

'view-pdf': function(host){

    const page=await pdfDoc.getPage(n),vp=page.getViewport({scale:1.5}),c=document.createElement('canvas');
    c.width=vp.width; c.height=vp.height;

    const wrap=rhs.querySelector('.preview-canvas-wrap'); wrap.innerHTML=''; wrap.appendChild(c);
    rhs.querySelector('#pgInfo').textContent=`${n} / ${pdfDoc.numPages}`;
  }
  const btn=document.createElement('button'); btn.className='btn btn-primary'; btn.style.marginTop='14px';
  btn.innerHTML=`<i class="fa-solid fa-book-open"></i> Buka PDF`; lhs.appendChild(btn);

    try{
      const ab=await readAsArrayBuffer(files[0]);
      pdfDoc=await loadPdfJs(ab); curPage=1;
      rhs.innerHTML=`<div class="preview-canvas-wrap"></div><div class="viewer-nav"><button class="btn btn-secondary btn-sm" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button><span id="pgInfo">1 / ?</span><button class="btn btn-secondary btn-sm" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button></div>`;
      await renderPage(1);
      rhs.querySelector('#prevBtn').addEventListener('click',async()=>{ if(curPage>1){ curPage--; await renderPage(curPage); } });
      rhs.querySelector('#nextBtn').addEventListener('click',async()=>{ if(curPage<pdfDoc.numPages){ curPage++; await renderPage(curPage); } });
    }catch(e){ toast(t('error')+e.message,true); }
  });
},

    if(!f1.length||!f2.length){ toast(t('error')+'Pilih 2 file PDF',true); return; }
    pg.start(t('processing')); outDiv.innerHTML='';
    try{
      async function getText(f){ const ab=await readAsArrayBuffer(f),pdf=await loadPdfJs(ab); let t=''; for(let i=1;i<=pdf.numPages;i++){ const p=await pdf.getPage(i),tc=await p.getTextContent(); t+=tc.items.map(x=>x.str).join(' ')+'\n'; } return t; }
      pg.set(30,'Membaca PDF 1...'); const txt1=await getText(f1[0]);
      pg.set(60,'Membaca PDF 2...'); const txt2=await getText(f2[0]);
      const lines1=txt1.split('\n'),lines2=txt2.split('\n');
      const maxLen=Math.max(lines1.length,lines2.length);
      let html='';
      for(let i=0;i<maxLen;i++){
        const l1=lines1[i]||'',l2=lines2[i]||'';
        if(l1===l2) html+=`<div>${l1.replace(/</g,'&lt;')||'&nbsp;'}</div>`;
        else if(l1&&!l2) html+=`<div class="diff-del">[−] ${l1.replace(/</g,'&lt;')}</div>`;
        else if(!l1&&l2) html+=`<div class="diff-add">[+] ${l2.replace(/</g,'&lt;')}</div>`;
        else html+=`<div class="diff-del">[−] ${l1.replace(/</g,'&lt;')}</div><div class="diff-add">[+] ${l2.replace(/</g,'&lt;')}</div>`;
      }
      pg.done(); outDiv.innerHTML=html||'<i>Tidak ada perbedaan.</i>'; pushHistory('Compare PDF',f1[0].name); toast(t('success'));
    }catch(e){ pg.done(); toast(t('error')+e.message,true); }
  });
},

}; // end TOOL_RENDERERS

/* ==========================================================================
   XOR ENCRYPT/DECRYPT
   ========================================================================== */
function xorEncrypt(bytes, password){
  const salt='DokuPro2024';
  const combined=password+salt;
  let key='';
  for(let i=0;i<32;i++){
    let hash=0;
    for(let j=0;j<combined.length;j++){ hash=((hash<<5)-hash)+combined.charCodeAt(j); hash=hash&hash; }
    key+=String.fromCharCode((hash&0xFF)^(combined.charCodeAt(i%combined.length)||42));
  }
  const result=new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++) result[i]=bytes[i]^key.charCodeAt(i%key.length);
  return result;
}
